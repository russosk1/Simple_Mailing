<!DOCTYPE html>
<html lang="es" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<!-- Activa el uso de vectores. / Activa las propiedades específicas de Microsoft Office-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-apple-disable-message-reformatting">
    <!--prohibe a Apple que modifique o rediseñe a la fuerza la estructura del correo.-->
    <title>Email</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:AllowPNG/>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <!--Corrige errores de diseño en Outlook-->
    <style>
        /* Soporte nativo para modo oscuro.*/
        @media (prefers-color-scheme: dark) {
            .body-bg {
                background-color: #121212 !important;
            }

            .card-bg {
                background-color: #1e1e1e !important;
            }

            .text-title {
                color: #ffffff !important;
            }

            .text-body {
                color: #b0b0b0 !important;
            }
        }
    </style>
</head>

<body >

    <!-- Preheader (Texto oculto que aparece en la vista previa de la bandeja de entrada) -->
    <div style="display: none; max-height: 0px; overflow: hidden;">
        Descubre las novedades que tenemos preparadas para ti esta semana.
    </div>

    <table width="100%" border="0" cellspacing="0" cellpadding="0" class="body-bg"
        style="background-color: #f8fafc; padding: 20px 0;">
        <tr>
            <td align="center">

                <!-- Estructura de Correo (Ancho adaptativo hasta 600px) -->
                <table width="100%" border="0" cellspacing="0" cellpadding="0" class="card-bg"
                    style="max-width: 600px; background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden;">

                    <!-- LOGO / HEADER -->
                    <tr>
                        <td align="left" style="padding: 24px 32px; border-bottom: 1px solid #f1f5f9;">
                            <span class="text-title"
                                style="font-size: 20px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px;">Studio2026</span>
                        </td>
                    </tr>

</body>

</html>
